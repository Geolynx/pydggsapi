[workspace]
name = "pydggsapi"
version = "0.1.5"
description = "A python FastAPI OGC DGGS API implementation"
authors = ["Wai Tik Chan <wai.tik.chan@ut.ee>", "Alexander Kmoch <alexander.kmoch@ut.ee>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10,<3.13"
duckdb = ">=1.3.2"

[pypi-dependencies]
uvicorn = ">=0.23.2"
fastapi = ">=0.120.0"
pydantic = ">=2.0.0"
tinydb = ">=4.8.2"
python-dotenv = ">=1.0.0"
gunicorn = ">=23.0.0"
h3 = ">=4.2.0"
shapely = ">=2.0.2"
pyproj = ">=3.6.1"
morecantile = ">=5.0.0"
pygeofilter = ">=0.3.1"
ordered-set = ">=4.1.0"
nest-asyncio = ">=1.6.0"
mapbox-vector-tile = ">=2.0.1"
py-ubjson = ">=0.16.1"

[feature.clickhouse.pypi-dependencies]
clickhouse-driver = ">=0.2.6"
clickhouse-cityhash = ">=1.0.2.4"

[feature.dggrid.dependencies]
dggrid = ">=8.4.1"

[feature.dggrid.pypi-dependencies]
dggrid4py = ">=0.5.3"

[feature.dggal.pypi-dependencies]
dggal = ">=0.0.5"

[feature.zarr.pypi-dependencies]
xarray = ">=2025.3.1"
zarr = ">=2.16.1"
gcsfs = ">=2025.10.0"
xarray-sql = ">=0.1.1"

[feature.scipy.pypi-dependencies]
scipy = ">=1.15.0"

[feature.dev.pypi-dependencies]
pytest = ">=4.3.0"
httpx = ">=0.28.1"

[environments]
default = ["dev"]
lean = []
full = ["clickhouse", "dggrid", "dggal", "zarr", "scipy", "dev"]
data-science = ["zarr", "scipy"]
database = ["clickhouse"]

[tasks]
start = "python pydggsapi/main.py"
test = "pytest pydggsapi/test"
